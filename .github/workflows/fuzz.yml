name: Fuzz

on:
    pull_request:
        paths:
            - ".github/workflows/fuzz.yml"
            - "fuzz/**"
            - "src/**"
            - "Cargo.toml"
    push:
        branches:
            - main
        paths:
            - ".github/workflows/fuzz.yml"
            - "fuzz/**"
            - "src/**"
            - "Cargo.toml"
    schedule:
        - cron: "23 3 * * 1"
    workflow_dispatch:

jobs:
    fuzz:
        name: ${{ matrix.target }}
        runs-on: ubuntu-latest
        env: { CARGO_BUILD_TARGET: "x86_64-unknown-linux-gnu", RUSTFLAGS: "-C target-feature=-crt-static" }
        strategy:
            fail-fast: false
            matrix:
                target:
                    - commands
                    - completion
                    - config
                    - git_operations
                    - identifier
                    - repo_config
                    - search
                    - tasks
                    - templates

        steps:
            - uses: actions/checkout@v7

            - { name: Install nightly Rust, uses: "dtolnay/rust-toolchain@nightly" }

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libdbus-1-3 libdbus-1-dev

            - name: Install protoc
              uses: SierraSoftworks/setup-protoc@v3.0.1
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Cache Cargo
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: |
                      . -> target
                      fuzz -> fuzz/target
                  key: fuzz-${{ matrix.target }}

            - name: Install cargo-fuzz
              uses: taiki-e/install-action@v2.83.2
              with:
                  tool: cargo-fuzz

            - name: Run fuzz target
              run: >-
                  cargo +nightly fuzz run --target x86_64-unknown-linux-gnu
                  ${{ matrix.target }} fuzz/corpus/${{ matrix.target }} --
                  -max_total_time=30 -timeout=10
