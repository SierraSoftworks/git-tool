# yaml-language-server: $schema=https://schemas.sierrasoftworks.com/git-tool/v1/template.schema.json
name: Gemini CLI
description: Launches Google's Gemini CLI coding assistant in a project directory.
version: 1.0.0
configs:
  - platform: windows
    app:
      name: gemini
      command: cmd.exe
      args:
        - "/Q"
        - "/C"
        - "gemini"
  - platform: linux
    app:
      name: gemini
      command: gemini
  - platform: darwin
    app:
      name: gemini
      command: gemini
