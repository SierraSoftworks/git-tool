# yaml-language-server: $schema=https://schemas.sierrasoftworks.com/git-tool/v1/template.schema.json
name: Claude Code
description: Launches Anthropic's Claude Code assistant in a project directory.
version: 1.0.0
configs:
  - platform: windows
    app:
      name: claude
      command: cmd.exe
      args:
        - "/Q"
        - "/C"
        - "claude"
  - platform: linux
    app:
      name: claude
      command: claude
  - platform: darwin
    app:
      name: claude
      command: claude
