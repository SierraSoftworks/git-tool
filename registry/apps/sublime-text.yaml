# yaml-language-server: $schema=https://schemas.sierrasoftworks.com/git-tool/v1/template.schema.json
name: Sublime Text
description: Launches the Sublime Text editor in a project directory.
version: 1.0.0
configs:
  - platform: windows
    app:
      name: subl
      command: cmd.exe
      args:
        - "/Q"
        - "/C"
        - "subl.exe ."
  - platform: linux
    app:
      name: subl
      command: subl
      args:
        - "."
  - platform: darwin
    app:
      name: subl
      command: subl
      args:
        - "."
