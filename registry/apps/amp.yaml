# yaml-language-server: $schema=https://schemas.sierrasoftworks.com/git-tool/v1/template.schema.json
name: Amp
description: Launches Sourcegraph's Amp coding agent in a project directory.
version: 1.0.0
configs:
  - platform: windows
    app:
      name: amp
      command: cmd.exe
      args:
        - "/Q"
        - "/C"
        - "amp"
  - platform: linux
    app:
      name: amp
      command: amp
  - platform: darwin
    app:
      name: amp
      command: amp
