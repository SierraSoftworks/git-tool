# yaml-language-server: $schema=https://schemas.sierrasoftworks.com/git-tool/v1/template.schema.json
name: Codex CLI
description: Launches OpenAI's Codex CLI coding assistant in a project directory.
version: 1.0.0
configs:
  - platform: windows
    app:
      name: codex
      command: cmd.exe
      args:
        - "/Q"
        - "/C"
        - "codex"
  - platform: linux
    app:
      name: codex
      command: codex
  - platform: darwin
    app:
      name: codex
      command: codex
