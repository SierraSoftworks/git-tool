# yaml-language-server: $schema=https://schemas.sierrasoftworks.com/git-tool/v1/template.schema.json
name: Qwen Code
description: Launches the Qwen Code AI coding assistant in a project directory.
version: 1.0.0
configs:
  - platform: windows
    app:
      name: qwen
      command: cmd.exe
      args:
        - "/Q"
        - "/C"
        - "qwen"
  - platform: linux
    app:
      name: qwen
      command: qwen
  - platform: darwin
    app:
      name: qwen
      command: qwen
