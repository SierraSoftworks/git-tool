# yaml-language-server: $schema=https://schemas.sierrasoftworks.com/git-tool/v1/template.schema.json
name: Fleet
description: Launches the JetBrains Fleet editor in a project directory.
version: 1.0.0
configs:
  - platform: windows
    app:
      name: fleet
      command: cmd.exe
      args:
        - "/Q"
        - "/C"
        - "fleet.cmd ."
  - platform: linux
    app:
      name: fleet
      command: fleet
      args:
        - "."
  - platform: darwin
    app:
      name: fleet
      command: fleet
      args:
        - "."
