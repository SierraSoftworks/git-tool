# yaml-language-server: $schema=https://schemas.sierrasoftworks.com/git-tool/v1/template.schema.json
name: Zed
description: Launches the Zed code editor in a project directory.
version: 1.0.0
configs:
  - platform: linux
    app:
      name: zed
      command: zed
      args:
        - "."
  - platform: darwin
    app:
      name: zed
      command: zed
      args:
        - "."
