# yaml-language-server: $schema=https://schemas.sierrasoftworks.com/git-tool/v1/template.schema.json
name: GitHub Copilot CLI
description: Launches the GitHub Copilot CLI coding agent in a project directory.
version: 1.0.0
configs:
  - platform: windows
    app:
      name: copilot
      command: cmd.exe
      args:
        - "/Q"
        - "/C"
        - "copilot"
  - platform: linux
    app:
      name: copilot
      command: copilot
  - platform: darwin
    app:
      name: copilot
      command: copilot
